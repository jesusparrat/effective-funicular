<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<style>
  :root {
    --bg:#0f0f13; --surface:#1a1a24; --surface2:#22222f;
    --accent:#6c63ff; --accent2:#a78bfa;
    --text:#e2e2f0; --muted:#7070a0; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

  header { background:var(--surface); border-bottom:1px solid #2a2a3f; padding:14px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  header h1 { font-size:1.2rem; font-weight:700; color:var(--accent2); flex-shrink:0; }
  header h1 span { color:var(--accent); }
  #search { flex:1; min-width:180px; background:var(--surface2); border:1px solid #2a2a3f; border-radius:8px; padding:7px 13px; color:var(--text); font-size:.9rem; outline:none; transition:border-color .2s; }
  #search:focus { border-color:var(--accent); }
  #m3u-row { display:flex; gap:8px; flex-wrap:wrap; width:100%; margin-top:8px; }
  #m3u-url { flex:1; min-width:240px; background:var(--surface2); border:1px solid #2a2a3f; border-radius:8px; padding:7px 13px; color:var(--text); font-size:.82rem; outline:none; }
  #m3u-url:focus { border-color:var(--accent); }
  #load-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:7px 16px; cursor:pointer; font-size:.88rem; font-weight:600; transition:background .2s; }
  #load-btn:hover { background:var(--accent2); }

  #groups { display:flex; gap:7px; padding:12px 20px; overflow-x:auto; background:var(--surface); border-bottom:1px solid #2a2a3f; scrollbar-width:thin; }
  .gbtn { background:var(--surface2); border:1px solid #2a2a3f; color:var(--muted); border-radius:20px; padding:5px 15px; cursor:pointer; font-size:.82rem; white-space:nowrap; transition:all .2s; flex-shrink:0; }
  .gbtn:hover, .gbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  #content { padding:20px; }
  .group-section { margin-bottom:32px; }
  .group-title { font-size:.9rem; font-weight:700; color:var(--accent2); margin-bottom:12px; padding-bottom:7px; border-bottom:1px solid #2a2a3f; text-transform:uppercase; letter-spacing:.06em; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }

  .card { background:var(--surface); border:1px solid #2a2a3f; border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:transform .15s, border-color .15s, box-shadow .15s; }
  .card:hover { transform:translateY(-3px); border-color:var(--accent); box-shadow:0 6px 20px rgba(108,99,255,.2); }
  .logo-wrap { background:#12121a; height:80px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .logo-wrap img { max-height:64px; max-width:88%; object-fit:contain; }
  .logo-wrap .nologo { font-size:1.8rem; color:var(--muted); }
  .card-info { padding:8px 10px; }
  .card-name { font-size:.78rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-meta { display:flex; align-items:center; gap:5px; margin-top:5px; flex-wrap:wrap; }
  .badge { font-size:.6rem; font-weight:700; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:.03em; }
  .b4k  { background:#f59e0b; color:#000; }
  .bfhd { background:#10b981; color:#000; }
  .bhd  { background:#3b82f6; color:#fff; }
  .bsd  { background:#6b7280; color:#fff; }
  .bace  { background:#7c3aed; color:#fff; }
  .bhttp { background:#0ea5e9; color:#fff; }
  .bopts { font-size:.68rem; color:var(--muted); margin-left:auto; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; align-items:center; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid #2a2a3f; border-radius:16px; padding:22px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; }
  .modal-hd { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .modal-logo { width:44px; height:44px; object-fit:contain; }
  .modal-title { font-size:.95rem; font-weight:700; }
  .modal-x { margin-left:auto; background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; line-height:1; }
  .modal-x:hover { color:var(--text); }
  .stream-row { background:var(--surface2); border:1px solid #2a2a3f; border-radius:9px; padding:10px 12px; margin-bottom:9px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .stream-label { font-size:.8rem; color:var(--muted); flex:1; min-width:100px; display:flex; align-items:center; gap:5px; }
  .btn { border:none; border-radius:7px; padding:6px 12px; font-size:.78rem; font-weight:600; cursor:pointer; }
  .btn:hover { opacity:.85; }
  .btn-vlc { background:#e87c00; color:#fff; }
  .btn-web { background:var(--accent); color:#fff; }

  #toast { position:fixed; bottom:14px; right:14px; background:var(--surface); border:1px solid #2a2a3f; border-radius:9px; padding:9px 15px; font-size:.8rem; color:var(--accent2); display:none; z-index:300; max-width:300px; }
  #empty { text-align:center; padding:50px 20px; color:var(--muted); }
  #empty .ei { font-size:2.6rem; margin-bottom:14px; }
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-thumb { background:#2a2a3f; border-radius:3px; }
</style>
</head>
<body>

<header>
  <h1>📺 <span>IPTV</span>Player</h1>
  <input id="search" type="text" placeholder="Buscar canal…" autocomplete="off">
  <div id="m3u-row">
    <input id="m3u-url" type="text" placeholder="URL del M3U (raw GitHub, etc.)">
    <button id="load-btn">Cargar lista</button>
  </div>
</header>

<div id="groups"></div>
<div id="content">
  <div id="empty"><div class="ei">📡</div><p>Introduce la URL de tu M3U y pulsa <strong>Cargar lista</strong></p></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hd">
      <img class="modal-logo" id="m-logo" src="" alt="">
      <span class="modal-title" id="m-title"></span>
      <button class="modal-x" id="m-close">✕</button>
    </div>
    <div id="m-streams"></div>
  </div>
</div>

<div id="toast"></div>

// Liga de Campeones
  'M+ Liga De Campeones': 'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/M%2B%20Liga%20De%20Campeones.png',

  'Eurosport 1': 'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Eurosport%201.png',

  // TDT
  'La 2':        'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/La%202.png',

  'La Sexta':    'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/La%20Sexta.png',
  'Teledeporte': 'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Teledeporte.png',

  // Clubes
  'Real Madrid TV': 'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Real%20Madrid%20TV.png',
  'Barça TV':       'https://raw.githubusercontent.com/davidmuma/picons_dobleM/master/icon/Barca%20TV.png',

};

function resolveLogo(name, fallback) {
  const n = name.toUpperCase();
  for (const [k, url] of Object.entries(LOGOS)) {
    if (k.toUpperCase() === n) return url;
  }
  for (const [k, url] of Object.entries(LOGOS)) {
    if (n.includes(k.toUpperCase())) return url;
  }
  return fallback || '';
}

// ── Reclasificación de grupos ─────────────────────────────────────────────────
const GROUP_RULES = [
  [/^DAZN/i,                                           'DAZN'],
  [/LIGA\s*DE\s*CAMPEONES/i,                           'LIGA DE CAMPEONES'],
  [/COPA\s*DEL\s*REY|^COPA\s/i,                       'COPA DEL REY'],
  [/SUPERCOPA/i,                                        'SUPERCOPA'],
  [/LALIGA|LALIGATV|HYPERMOTION/i,                     'LIGA'],
  [/M\+\s*(DEPORTES|DEPORTE)/i,                        'DEPORTES'],
  [/EUROSPORT/i,                                        'EUROSPORT'],
  [/^(LA [12]|24H|TELECINCO|CUATRO|ANTENA|SEXTA|MEGA|TELEDEPORTE|GOL PLAY|REAL MADRID TV|BARC|M\+\s*(GOLF|#|VAMOS)|TOROS|MOVISTAR)/i, 'TDT'],
];

function reclassify(name, rawGroup) {
  for (const [re, group] of GROUP_RULES) {
    if (re.test(name)) return group;
  }
  return rawGroup.trim().toUpperCase() || 'OTROS';
}

// ── Parser M3U ────────────────────────────────────────────────────────────────
function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (/^#EXTINF/i.test(line)) {
      const norm   = line.replace(/grupo-titulo/gi, 'group-title').replace(/group-title\s*=/gi, 'group-title=');
      const name   = (norm.match(/,(.+)$/) || [])[1]?.trim() || 'Canal';
      const logo   = (norm.match(/tvg-logo\s*=\s*"([^"]*)"/i) || [])[1] || '';
      const rawGrp = (norm.match(/group-title\s*=\s*"([^"]*)"/i) || [])[1] || 'OTROS';
      cur = { name, logo, group: reclassify(name, rawGrp), qual: detectQ(name) };
    } else if (cur && line && !line.startsWith('#')) {
      cur.url  = line;
      cur.type = line.startsWith('acestream://') ? 'ace' : 'http';
      result.push(cur);
      cur = null;
    }
  }
  return result;
}

function detectQ(name) {
  const n = name.toUpperCase();
  if (n.includes('4K') || n.includes('UHD'))  return '4K';
  if (n.includes('FHD') || n.includes('1080')) return 'FHD';
  if (n.includes('HD')  || n.includes('720'))  return 'HD';
  return 'SD';
}

function canonical(name) {
  return name
    .replace(/\s*(4K|FHD|HD|SD|UHD|\d{3,4}p?)\s*$/i, '')
    .replace(/\s*M\d+\s*$/i, '')
    .replace(/\s*\(Opci[oó]n\s*\d+\)\s*$/i, '')
    .replace(/\s*(Multi|Opci[oó]n\s*\d+)\s*$/i, '')
    .trim();
}

function groupChannels(raw) {
  const map = new Map();
  for (const ch of raw) {
    const cname = canonical(ch.name);
    const key   = ch.group + '||' + cname;
    if (!map.has(key)) {
      map.set(key, { ...ch, cname, logo: resolveLogo(cname, ch.logo), streams: [ch] });
    } else {
      map.get(key).streams.push(ch);
    }
  }
  return [...map.values()];
}

// ── Estado ────────────────────────────────────────────────────────────────────
let channels    = [];
let activeGroup = 'TODOS';

const GROUP_ORDER = ['TODOS','LIGA DE CAMPEONES','DAZN','LIGA','TDT','DEPORTES','EUROSPORT','COPA DEL REY','SUPERCOPA','OTROS'];

function orderedGroups(chs) {
  const present = new Set(chs.map(c => c.group));
  const ordered = GROUP_ORDER.filter(g => g === 'TODOS' || present.has(g));
  const extra   = [...present].filter(g => !GROUP_ORDER.includes(g)).sort();
  return [...ordered, ...extra];
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(group, q) {
  const bar = document.getElementById('groups');
  let list = channels;
  if (q) {
    const s = q.toLowerCase();
    list = channels.filter(c => c.cname.toLowerCase().includes(s) || c.group.toLowerCase().includes(s));
  }
  bar.innerHTML = orderedGroups(channels).map(g =>
    `<button class="gbtn${g === group ? ' active' : ''}" data-g="${g}">${g}</button>`
  ).join('');
  bar.querySelectorAll('.gbtn').forEach(b =>
    b.addEventListener('click', () => { activeGroup = b.dataset.g; render(activeGroup, document.getElementById('search').value); })
  );

  const visible = group === 'TODOS' ? list : list.filter(c => c.group === group);
  const content = document.getElementById('content');

  if (!visible.length) {
    content.innerHTML = '<div id="empty"><div class="ei">🔍</div><p>Sin resultados</p></div>';
    return;
  }

  const secOrder = orderedGroups(visible).filter(g => g !== 'TODOS');
  const sections = Object.fromEntries(secOrder.map(g => [g, []]));
  for (const c of visible) if (sections[c.group]) sections[c.group].push(c);

  content.innerHTML = secOrder.map(g => `
    <div class="group-section">
      <div class="group-title">${g}</div>
      <div class="grid">${sections[g].map(buildCard).join('')}</div>
    </div>`).join('');

  content.querySelectorAll('.card').forEach(el =>
    el.addEventListener('click', () => openModal(+el.dataset.i))
  );
}

function buildCard(ch) {
  const i   = channels.indexOf(ch);
  const qc  = { '4K':'b4k','FHD':'bfhd','HD':'bhd','SD':'bsd' }[ch.qual] || 'bsd';
  const tc  = ch.type === 'ace' ? 'bace' : 'bhttp';
  const tl  = ch.type === 'ace' ? 'ACE'  : 'HTTP';
  const opts = ch.streams.length > 1 ? `<span class="bopts">${ch.streams.length} opc.</span>` : '';
  const img  = ch.logo
    ? `<img src="${ch.logo}" alt="" onerror="imgErr(this)">`
    : '<span class="nologo">📺</span>';
  return `<div class="card" data-i="${i}">
    <div class="logo-wrap">${img}</div>
    <div class="card-info">
      <div class="card-name">${ch.cname}</div>
      <div class="card-meta">
        <span class="badge ${qc}">${ch.qual}</span>
        <span class="badge ${tc}">${tl}</span>${opts}
      </div>
    </div>
  </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(i) {
  const ch = channels[i];
  const mLogo = document.getElementById('m-logo');
  mLogo.src = ch.logo || '';
  mLogo.style.display = ch.logo ? '' : 'none';
  document.getElementById('m-title').textContent = ch.cname;

  const streamsDiv = document.getElementById('m-streams');
  streamsDiv.innerHTML = ch.streams.map((s, idx) => {
    const isAce   = s.type === 'ace';
    const httpUrl = isAce
      ? `${ACE_ENG}/ace/getstream?id=${s.url.replace('acestream://', '')}`
      : s.url;
    const qc = { '4K':'b4k','FHD':'bfhd','HD':'bhd','SD':'bsd' }[s.qual] || 'bsd';
    const webBtn = !isAce
      ? `<button class="btn btn-web" data-action="web" data-url="">🌐 Web</button>`
      : '';
    return `<div class="stream-row" data-http="">
      <div class="stream-label">
        <span class="badge ${qc}">${s.qual}</span>
        <span>Opción ${idx + 1}</span>
      </div>
      <button class="btn btn-vlc" data-action="vlc" data-url="">🟠 VLC</button>
      ${webBtn}
    </div>`;
  }).join('');

  // Asignar URLs via JS, sin inline strings con comillas
  const rows = streamsDiv.querySelectorAll('.stream-row');
  ch.streams.forEach((s, idx) => {
    const isAce   = s.type === 'ace';
    const httpUrl = isAce
      ? `${ACE_ENG}/ace/getstream?id=${s.url.replace('acestream://', '')}`
      : s.url;
    const row = rows[idx];
    row.querySelectorAll('[data-url]').forEach(btn => btn.dataset.url = httpUrl);
  });

  document.getElementById('overlay').classList.add('open');
}

document.getElementById('m-streams').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const url    = btn.dataset.url;
  const action = btn.dataset.action;
  if (action === 'vlc') launchVLC(url);
  if (action === 'web') openWeb(url);
});

document.getElementById('m-close').addEventListener('click', () =>
  document.getElementById('overlay').classList.remove('open')
);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── Lanzadores ────────────────────────────────────────────────────────────────
function launchVLC(url) {
  fetch(`${VLC_SRV}/play?player=vlc&url=${encodeURIComponent(url)}`)
    .then(r => r.json())
    .then(d => toast(d.ok ? '🟠 VLC lanzado' : '⚠️ ' + d.error))
    .catch(() => toast('❌ vlc_server.py no está corriendo'));
}

function openWeb(url) {
  window.open(url, '_blank');
  toast('🌐 Abriendo en navegador…');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3200);
}

// ── Carga M3U ─────────────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', loadM3U);
document.getElementById('m3u-url').addEventListener('keydown', e => { if (e.key === 'Enter') loadM3U(); });
document.getElementById('search').addEventListener('input', e => render(activeGroup, e.target.value));

function loadM3U() {
  const url = document.getElementById('m3u-url').value.trim();
  if (!url) return;
  toast('Cargando…');
  fetch(url)
    .then(r => r.text())
    .then(txt => {
      const raw = parseM3U(txt);
      channels    = groupChannels(raw);
      activeGroup = 'TODOS';
      render('TODOS', '');
      toast(`✅ ${raw.length} streams → ${channels.length} canales`);
    })
    .catch(e => toast('❌ ' + e.message));
}

function imgErr(img) {
  const wrap = img.parentElement;
  if (wrap) { wrap.innerHTML = '<span class="nologo">📺</span>'; }
}

</script>
